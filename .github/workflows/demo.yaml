name: My-demo-flow
on:
  push:
    branches:
    - main
jobs:
  Checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code.
        uses: actions/checkout@v4

      - name: SetUp java17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17' 
      - name: compile java app
        run: javac HelloWorld.java
